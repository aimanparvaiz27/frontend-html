<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        <label for="name">Username</label>
        <input type="text", id="name", placeholder="Enter your username"><br><br>

        <label for="email">Email</label>
        <input type="email", id="email", placeholder="Enter your email"><br><br>

        <label for="password">Password</label>
        <input type="password", id="password", placeholder="Password"><br><br>

        <p>Select Your Gender</p>
        <label for="">Male</label><input type="radio", id="male", name="gender">
        <label for="">Female</label><input type="radio", id="female", name="gender">
        <label for="">Others</label><input type="radio", id="others", name="gender"><br><br>

        <select>
            <option value="Civic">Civic</option>
            <option value="Audi">Audi</option>
            <option value="bmw">BMW</option>
        </select>

        <input type="submit", value="Signup">
    </form>
</body>
</html>
