<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>learn about images, video and table tags</title>
</head>
<body>
    <!-- Image tag -->
     <img width ="300", height="300", src="images/pexels-rachel-claire-4993283.jpg", alt="photography">

    <!-- Video tag -->
     <video width="300", height="400", controls>
        <source src="images/pexels-cottonbro-3831862.jpg">
        Your browser doesn't support this video
     </video>

     <!-- Table tags -->
      <table border="2">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Phone number</th>
            <th>Gmail</th>
        </tr>
        <tr>
            <td>Aiman Parvaiz</td>
            <td>26</td>
            <td>03014433333434</td>
            <td>abc@gmail.com/<td>
        </tr>
      </table>
</body>
</html>
